[tool.poetry]
name = "mlops-test-task"
version = "0.1.0"
description = ""
authors = ["Ivan Strizhkin <Ivan.Strizhkin@mail.ru>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11,<3.12"
grpcio = "==1.81.0"
protobuf = ">=6.33.5,<7.0.0"
onnxruntime = "^1.26.0"
pydantic = "^2.13.4"
pydantic-settings = "^2.14.1"
dependency-injector = "^4.49.0"
loguru = "^0.7.3"
orjson = "^3.11.9"
grpcio-reflection = "^1.81.0"
grpcio-health-checking = "^1.81.0"

[tool.poetry.group.dev.dependencies]
torch = [
    {version = "^2.12.0+cpu", source = "pytorch-cpu", markers = "sys_platform == 'linux'"},
    {version = "^2.12.0", source = "PyPI", markers = "sys_platform == 'darwin'"},
]
onnx = "^1.21.0"
ruff = "^0.15.16"
black = "^26.5.1"
pyright = {version = "^1.1.410", extras = ["nodejs"]}
pytest = "^9.0.3"
pytest-asyncio = "^1.0.0"


[[tool.poetry.source]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
priority = "explicit"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
src = ["src"]
line-length = 120
# Python 3.11.
target-version = "py311"
# Group violations by containing file.
output-format = "grouped"
# Avoid automatically removing unused imports in __init__.py files.
ignore-init-module-imports = true
# Disable warinings on this tags.
task-tags = ["TODO"]
# GRPC auto-generated files
exclude = [
    "**/*_pb2.py",
    "**/*_pb2.pyi",
    "**/*_pb2_grpc.py"
]
# Rules.
select = [
    # pycodestyle.
    "E", "W",
    # Pyflakes.
    "F",
    # isort.
    "I",
    # pydocstyle.
    "D",
    # pyupgrade.
    "UP",
    # pep8-naming.
    "N",
    # flake8-2020.
    "YTT",
    # flake8-annotations.
    "ANN",
    # flake8-bandit.
    "S",
    # flake8-blind-except.
    "BLE",
    # flake8-boolean-trap.
    "FBT",
    # flake8-bugbear.
    "B",
    # flake8-builtins.
    "A",
    # flake8-comprehensions.
    "C4",
    # flake8-debugger.
    "T10",
    # flake8-errmsg.
    "EM",
    # flake8-implicit-str-concat.
    "ISC",
    # flake8-import-conventions.
    "ICN",
    # flake8-print.
    "T20",
    # flake8-pytest-style.
    "PT",
    # flake8-quotes.
    "Q",
    # flake8-return.
    "RET",
    # flake8-simplify.
    "SIM",
    # flake8-tidy-imports.
    "TID",
    # flake8-datetimez.
    "DTZ",
    # eradicate.
    "ERA",
    # pandas-vet.
    "PD",
    # pygrep-hooks.
    "PGH",
    # Pylint.
    "PLC", "PLE", "PLR", "PLW",
    # flake8-pie.
    "PIE",
    # Ruff-specific rules.
    "RUF",
]
# Disable.
ignore = [
    # Missing docstring in public module.
    "D100",
    # Missing docstring in public class.
    "D101",
    # Missing docstring in public method.
    "D102",
    # Missing docstring in public function.
    "D103",
    # Missing docstring in public package.
    "D104",
    # Missing docstring in public magic method.
    "D105",
    # Missing docstring in public nested class.
    "D106",
    # Missing docstring in __init__ method.
    "D107",
    # One-line docstring should fit on one line.
    "D200",
    # Multi-line docstring summary should start at the first line,
    "D212",
    # Dynamically typed expressions (typing.Any) are disallowed.
    "ANN401",
    # Shorted imports (numpy as np, etc).
    "ICN001",
    # Import from {module} instead: {names}
    "UP035",
    # Do not catch blind exception: `Exception`.
    "BLE001",
    # Possible SQL injection vector through string-based query construction.
    "S608",
    # Empty string in if.
    "PLC1901",
    # Weired safety issues
    "S311",
    "S603",
    "S602",
    "S301",
    "S104",
    "S101",
    # Class attribure `id`
    "A003",
    "A002",
    # Format for function calls
    "D415"
]

[tool.ruff.isort]
# Combines "as" imports on the same line.
combine-as-imports = true
# Place "closer" imports (fewer . characters, most local) before "further" imports.
relative-imports-order = "closest-to-furthest"

[tool.ruff.flake8-tidy-imports]
# Disallow all relative imports.
ban-relative-imports = "all"

[tool.ruff.pep8-naming]
# Allow Pydantic's `@validator` decorator to trigger class method treatment.
classmethod-decorators = ["classmethod", "pydantic.validator", "pydantic.root_validator"]

[tool.ruff.pycodestyle]
max-doc-length = 100

[tool.ruff.pydocstyle]
# Use Google-style docstrings.
convention = "google"

[tool.ruff.flake8-annotations]
# Suppress ANN000-level violations for arguments matching the "dummy" variable regex (like _).
suppress-dummy-args = true

[tool.black]
line-length = 120
# Python 3.11.
target-version = ["py311"]
# Colored output.
color = true
extend-exclude = '''
(
  .*_pb2_grpc.py # exclude autogenerated GRPC files anywhere in the project
  | .*_pb2.py  # exclude autogenerated Protocol Buffer files anywhere in the project
  | .*_pb2.pyi  # exclude autogenerated Protocol Buffer files anywhere in the project
)
'''

[tool.pytest.ini_options]
pythonpath = [
    "src"
]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"

[tool.pyright]
typeCheckingMode = "standard"
include = ["src"]
exclude = [
    "src/grpc_proto",
    "src/**/container.py",
]
reportMissingImports = "error"
reportMissingTypeStubs = false
pythonVersion = "3.11"