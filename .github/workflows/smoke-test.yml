name: Smoke Test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Smoke test production endpoint
        run: |
          docker run --rm \
            -e GRPC_TOKEN='${{ secrets.GRPC_TOKEN }}' \
            ghcr.io/${{ github.repository }}:latest \
            python scripts/smoke_test.py --address '${{ secrets.SSH_HOST }}:50051'
