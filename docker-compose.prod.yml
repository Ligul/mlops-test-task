services:
  recommender:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ENV: prod
      ONNX_PROVIDERS: '["CPUExecutionProvider"]'
      GRPC_TOKEN: ${GRPC_TOKEN:?GRPC_TOKEN must be provided by the deploy pipeline}
      OTEL_TRACES_EXPORTER: otlp
      OTEL_SERVICE_NAME: recommender
      OTEL_EXPORTER_OTLP_ENDPOINT: https://otlp-gateway-prod-eu-west-2.grafana.net/otlp
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:?OTEL_EXPORTER_OTLP_HEADERS must be provided by the deploy pipeline}
    ports:
      - "0.0.0.0:50051:50051"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s
