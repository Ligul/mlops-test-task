services:
  recommender:
    image: ${IMAGE_NAME}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      ENV: prod
      ONNX_PROVIDERS: '["CPUExecutionProvider"]'
      GRPC_TOKEN: ${GRPC_TOKEN:?GRPC_TOKEN must be provided by the deploy pipeline}
    ports:
      - "0.0.0.0:50051:50051"
    healthcheck:
      test: ["CMD", "/bin/grpc_health_probe", "-addr=:50051"]
      interval: 10s
      timeout: 2s
      retries: 3
      start_period: 5s
